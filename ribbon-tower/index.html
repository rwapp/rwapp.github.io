<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ribbon Tower</title>
  <meta name="description" content="A Glastonbury vibe every day.">
  <style>
    :root {
      --bg: #F4ECDD;        /* warm paper (Palette.background light) */
      --ink: #2B2417;       /* Palette.ink light */
      --ink-muted: #6E6048; /* Palette.inkMuted light */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1E1A14;      /* deep peat (Palette.background dark) */
        --ink: #F1E7D4;
        --ink-muted: #B6A887;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.25rem;
      -webkit-text-size-adjust: 100%;
    }
    .pyramid { width: 180px; height: 145px; margin-bottom: 2rem; }
    h1 {
      /* Serif display face to echo the app's Playfair / system‑serif headings. */
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 7vw, 3rem);
      font-weight: 600;
      margin: 0 0 .5rem;
      letter-spacing: .01em;
    }
    p.tagline {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-size: clamp(1.05rem, 4vw, 1.3rem);
      color: var(--ink-muted);
      margin: 0;
    }
    footer {
      margin-top: 3rem;
      font-size: .85rem;
      color: var(--ink-muted);
    }
    footer a { color: var(--ink-muted); }
  </style>
</head>
<body>
  <!--
    Faithful recreation of the app's Pyramid motif (Design/PyramidView.swift).
    Three nested triangles (intrinsic 72×58, shown here ×2.5 → 180×145), each scaled
    by tier (outer 3/3, middle 2/3, inner 1/3) and bottom‑aligned. Each tier is lit
    only along its two sloped SIDES (not the base): a wide soft blur (lineWidth 6,
    blur 7, 70% opacity) + a tight glow (lineWidth 2.5, blur 2) + a crisp edge
    (lineWidth 1.2, 95% opacity), all clipped to the triangle. Stage‑light palette:
    gold #E0A24A apex, magenta #B662C9 middle, green #4FB477 base.
  -->
  <svg class="pyramid" viewBox="0 0 72 58" aria-label="Ribbon Tower" role="img"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Blur radii match the app's .blur(radius:) (SVG stdDeviation ≈ radius/2). -->
      <filter id="wide" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3.5"/>
      </filter>
      <filter id="tight" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1"/>
      </filter>

      <!-- One clip per tier: the filled triangle that contains that tier's glow. -->
      <!-- Outer (green) tier: full 72×58, base at y=58. -->
      <clipPath id="clipOuter"><polygon points="36,0 72,58 0,58"/></clipPath>
      <!-- Middle (magenta) tier: 2/3 → 48×38.667, bottom‑aligned (base at y=58). -->
      <clipPath id="clipMid"><polygon points="36,19.333 60,58 12,58"/></clipPath>
      <!-- Inner (gold) tier: 1/3 → 24×19.333, bottom‑aligned. -->
      <clipPath id="clipInner"><polygon points="36,38.667 48,58 24,58"/></clipPath>
    </defs>

    <!-- Largest tier first (drawn at the back), like the app's ZStack ordering. -->

    <!-- GREEN (base / outer): sides = bottom‑left → apex → bottom‑right. -->
    <g clip-path="url(#clipOuter)" fill="none" stroke="#4FB477" stroke-linejoin="round">
      <polyline points="0,58 36,0 72,58" stroke-width="6" filter="url(#wide)" opacity="0.7"/>
      <polyline points="0,58 36,0 72,58" stroke-width="2.5" filter="url(#tight)"/>
      <polyline points="0,58 36,0 72,58" stroke-width="1.2" opacity="0.95"/>
    </g>

    <!-- MAGENTA (middle). -->
    <g clip-path="url(#clipMid)" fill="none" stroke="#B662C9" stroke-linejoin="round">
      <polyline points="12,58 36,19.333 60,58" stroke-width="6" filter="url(#wide)" opacity="0.7"/>
      <polyline points="12,58 36,19.333 60,58" stroke-width="2.5" filter="url(#tight)"/>
      <polyline points="12,58 36,19.333 60,58" stroke-width="1.2" opacity="0.95"/>
    </g>

    <!-- GOLD (apex / inner). -->
    <g clip-path="url(#clipInner)" fill="none" stroke="#E0A24A" stroke-linejoin="round">
      <polyline points="24,58 36,38.667 48,58" stroke-width="6" filter="url(#wide)" opacity="0.7"/>
      <polyline points="24,58 36,38.667 48,58" stroke-width="2.5" filter="url(#tight)"/>
      <polyline points="24,58 36,38.667 48,58" stroke-width="1.2" opacity="0.95"/>
    </g>
  </svg>

  <h1>Ribbon Tower</h1>
  <p class="tagline">A Glastonbury vibe every day</p>

  <!-- App Store link goes here once the listing exists. -->

  <footer>
    <a href="privacy.html">Privacy</a>
  </footer>
</body>
</html>
